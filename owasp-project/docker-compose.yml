services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: owasp-laravel
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - owasp-net
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: owasp-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"   # ВАЖНО: bind само на localhost, никогаш 0.0.0.0
    volumes:
      - ./src:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - owasp-net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: owasp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: owasp
      MYSQL_USER: owasp
      MYSQL_PASSWORD: owasp_password
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - owasp-net
    # Намерно НЕ изложуваме порта 3306 надвор - базата е достапна само внатре во мрежата

networks:
  owasp-net:
    driver: bridge
